# ============================================================
# BCDR DeveloperAI Configuration (safe to commit)
# ============================================================
# Generic / structural settings live here.
# Secrets (PAT, API keys, endpoints) go in config.local.yaml
# which is gitignored and never committed.
#
# Load order (last wins):
#   1. config.yaml           ← this file (committed)
#   2. config.local.yaml     ← secrets & overrides (gitignored)
#   3. Environment variables ← highest priority
#
# Environment variable overrides:
#   BCDR_DEVAI_AZURE_DEVOPS_PAT
#   BCDR_DEVAI_LLM_API_KEY
#   BCDR_DEVAI_KUSTO_CLUSTER_URL
#   BCDR_DEVAI_KUSTO_DATABASE
# ============================================================

# --- Azure DevOps Repo Sync ---
azure_devops:
  # pat: set in config.local.yaml or BCDR_DEVAI_AZURE_DEVOPS_PAT
  repo_url: "https://msazure.visualstudio.com/One/_git/Mgmt-RecoverySvcs-BackupMgmt"
  branch: "feature/add-agent-kt-memory-doc"
  sync_paths:
    - "docs/agentKT"
  file_extensions:
    - ".md"

# --- LLM (Azure AI Foundry) ---
# endpoint & api_key: set in config.local.yaml or BCDR_DEVAI_LLM_API_KEY
llm:
  provider: "azure_openai"
  # endpoint: set in config.local.yaml
  # api_key: set in config.local.yaml
  api_version: "2025-01-01-preview"
  model: "gpt-4o-mini"
  max_tokens: 8192

# --- Kusto / Azure Data Explorer ---
# cluster_url & database: set in config.local.yaml or env vars
kusto:
  # cluster_url: set in config.local.yaml
  # database: set in config.local.yaml
  auth_method: "az_cli"

# --- Vector Store (ChromaDB) ---
vectorstore:
  persist_directory: ".chromadb"
  collection_name: "agent_kt_docs"
  embedding_model: "all-MiniLM-L6-v2"
  chunk_size: 1000
  chunk_overlap: 200

# --- Paths ---
paths:
  docs_dir: "docs/agentKT"
  repo_clone_dir: ".repo_cache"

# --- Code Index (for Coder Agent) ---
# Indexes source code from the BMS repo for code-path tracing
code_index:
  collection_name: "bms_code"
  chunk_size: 1500
  chunk_overlap: 300
  # Paths within the repo to index (relative to repo root)
  # Leave empty to index the entire repo
  sync_paths:
    - "src"
  # File extensions to index
  file_extensions:
    - ".cs"
    - ".py"
    - ".json"
    - ".config"

# --- Coder Agent ---
# Controls how much code context the coder agent feeds to the LLM.
coder_agent:
  # Max code chunks to retrieve per search query
  top_k_per_query: 12
  # Max total characters of code context sent to the LLM
  # gpt-4o-mini supports ~128K tokens (~400K chars); we use a
  # conservative budget so the system prompt + history still fit.
  max_context_chars: 80000
  # Minimum relevance score (0-1) to include a code chunk
  min_relevance_score: 0.20

# --- Protected Docs (shared across all agents) ---
# These files are read-only reference material. No agent (knowledge_updater,
# doc_improver, etc.) is allowed to modify them.  They will still be
# searched for context, but edits are blocked.
protected_docs:
  - "BackupMgmt_Architecture_Memory.md"
  - "Telemetry_And_Logging_Reference.md"

# --- Agent Routing ---
agents:
  # Add new agents here in future
  enabled:
    - "knowledge"
    - "debug"
    - "coder"
    - "knowledge_updater"
  # Minimum similarity score (0.0–1.0) for the knowledge agent to be
  # considered a confident match. Below this the coder agent is tried.
  knowledge_confidence_threshold: 0.45
  # If knowledge confidence is below this, flag the topic as a documentation
  # gap and offer to create a new doc via the knowledge_updater agent.
  # Note: with all-MiniLM-L6-v2 embeddings, good matches score ~0.50-0.60,
  # mediocre matches ~0.35-0.50, and poor matches <0.35.
  doc_gap_threshold: 0.50

# ============================================================
# 🐝 Agent Hive Architecture
# ============================================================
# Each hive is a self-contained domain with its own docs, code
# index, vector collections, and agent set. The top-level
# HiveRouter selects which hive(s) handle a user query.
#
# Shared settings (llm, kusto, vectorstore defaults) are
# inherited from the top level unless overridden per-hive.
# ============================================================
hives:
  # If true, use the HiveRouter (multi-hive mode).
  # If false, use the classic single BrainAgent (backward compat).
  enabled: true

  # Default hive — used when the router can't determine domain
  default_hive: "bms"

  definitions:
    bms:
      display_name: "Backup Management Service"
      description: >
        The primary BCDR hive covering the Backup Management Service.
        Handles DPP (Data Protection Platform) and RSV (Recovery Services Vault)
        features, backup/restore operations, Kusto debugging, and all
        management-plane APIs.
      scope:
        topics:
          - "backup management"
          - "DPP"
          - "RSV"
          - "backup policies"
          - "backup instances"
          - "restore operations"
          - "cross-region restore"
          - "protection containers"
          - "recovery points"
          - "vault configuration"
          - "soft delete"
          - "resource guards"
          - "jobs and operations"
          - "BMS service"
          - "auto protection"
          - "tiering"
          - "data move"
          - "resource move"
        kusto_tables:
          - "OperationStatsLocalAllClusters"
          - "TraceLogMessageAllClusters"
          - "ArtifactSnapshotAll"
      paths:
        docs_dir: "docs/agentKT"
        repo_clone_dir: ".repo_cache"
      vectorstore:
        collection_name: "agent_kt_docs"
      code_index:
        collection_name: "bms_code"
        sync_paths:
          - "src"
      agents:
        enabled:
          - "knowledge"
          - "debug"
          - "coder"
          - "knowledge_updater"

    dataplane:
      display_name: "Backup Data Plane"
      description: >
        Backup data plane services — fabric agents, backup engines,
        snapshot orchestration, data transfer, and platform-agnostic
        backup/restore execution logic.
      scope:
        topics:
          - "data plane"
          - "backup engine"
          - "fabric agent"
          - "snapshot orchestration"
          - "data transfer"
          - "platform agnostic backup"
          - "backup execution"
          - "restore execution"
          - "incremental backup"
          - "backup data pipeline"
        kusto_tables:
          - "OperationStatsLocalAllClusters"
          - "TraceLogMessageAllClusters"
      paths:
        docs_dir: "docs/agentKT"
        repo_clone_dir: "D:/TEMP/Mgmt-RecoverySvcs-BackupDataPlane"
      vectorstore:
        collection_name: "dataplane_docs"
      code_index:
        collection_name: "dataplane_code"
        sync_paths:
          - "src/Service"
          - "src/ClientLib"
          - "src/PlatformAgnostic"
      agents:
        enabled:
          - "knowledge"
          - "debug"
          - "coder"

    common:
      display_name: "Common Libraries & Infrastructure"
      description: >
        Shared libraries, SDK utilities, common data contracts,
        authentication helpers, DPP common code, and infrastructure
        used across all BCDR services. Includes base classes,
        serialization, error handling, and cloud utilities.
      scope:
        topics:
          - "common libraries"
          - "SDK utilities"
          - "shared data contracts"
          - "authentication"
          - "common helpers"
          - "infrastructure code"
          - "serialization"
          - "error handling utilities"
          - "DPP common"
          - "cloud utilities"
          - "base classes"
          - "NuGet packages"
        kusto_tables: []
      paths:
        docs_dir: "docs/agentKT"
        repo_clone_dir: "D:/TEMP/Mgmt-RecoverySvcs-Common"
      vectorstore:
        collection_name: "common_docs"
      code_index:
        collection_name: "common_code"
        sync_paths:
          - "src/Cloud"
          - "src/Base"
          - "src/Dpp"
          - "src/Public"
      agents:
        enabled:
          - "knowledge"
          - "coder"

    protection:
      display_name: "Workload Coordination & Protection"
      description: >
        Workload coordination service — handles workload-specific
        protection for VMs, SQL, SAP HANA, Azure Files, and other
        datasource types. Manages workload plugins, snapshot
        coordination, quiesce/unquiesce, and backup/restore extensions.
      scope:
        topics:
          - "workload coordination"
          - "protection agents"
          - "workload plugins"
          - "VM backup"
          - "SQL backup"
          - "SAP HANA backup"
          - "Azure Files backup"
          - "snapshot coordination"
          - "quiesce"
          - "IaaS VM"
          - "Azure workload"
          - "workload extensions"
        kusto_tables:
          - "OperationStatsLocalAllClusters"
          - "TraceLogMessageAllClusters"
      paths:
        docs_dir: "docs/agentKT"
        repo_clone_dir: "D:/TEMP/Mgmt-RecoverySvcs-WkloadCoord"
      vectorstore:
        collection_name: "prot_docs"
      code_index:
        collection_name: "prot_code"
        sync_paths:
          - "src/Service"
          - "src/ClientLib"
      agents:
        enabled:
          - "knowledge"
          - "debug"
          - "coder"

    regional:
      display_name: "Regional RP & PIT Catalog"
      description: >
        Regional Resource Provider and Point-in-Time Catalog services.
        Handles regional backup vault operations, recovery point
        management, point-in-time restore catalog, and geo-redundant
        backup infrastructure.
      scope:
        topics:
          - "regional RP"
          - "regional resource provider"
          - "PIT catalog"
          - "point in time"
          - "recovery point catalog"
          - "geo redundant"
          - "regional backup"
          - "recovery point management"
        kusto_tables:
          - "OperationStatsLocalAllClusters"
      paths:
        docs_dir: "docs/agentKT"
        repo_clone_dir: "D:/TEMP/Mgmt-RecoverySvcs-RegionalRP"
      vectorstore:
        collection_name: "regional_docs"
      code_index:
        collection_name: "regional_code"
        sync_paths:
          - "src/Service"
          - "src/ClientLib"
      agents:
        enabled:
          - "knowledge"
          - "coder"

    datamover:
      display_name: "Data Mover Service"
      description: >
        Data movement service — handles data transfer between storage
        accounts, cross-region data replication, backup data migration,
        and bulk data operations for backup and restore workflows.
      scope:
        topics:
          - "data mover"
          - "data movement"
          - "data transfer"
          - "cross region replication"
          - "data migration"
          - "bulk data operations"
          - "storage transfer"
          - "DOST"
        kusto_tables:
          - "OperationStatsLocalAllClusters"
      paths:
        docs_dir: "docs/agentKT"
        repo_clone_dir: "D:/TEMP/Mgmt-RecoverySvcs-DataMover"
      vectorstore:
        collection_name: "datamover_docs"
      code_index:
        collection_name: "datamover_code"
        sync_paths:
          - "src/Client"
          - "src/Common"
          - "src/CommonL2"
          - "src/Contracts"
          - "src/DMClient"
          - "src/Dost"
      agents:
        enabled:
          - "knowledge"
          - "coder"

    monitoring:
      display_name: "Monitoring & Alerting"
      description: >
        Monitoring and alerting infrastructure for BCDR services.
        Handles backup health monitoring, alert generation, diagnostic
        telemetry, SLA tracking, and operational dashboards.
      scope:
        topics:
          - "monitoring"
          - "alerting"
          - "backup health"
          - "SLA tracking"
          - "diagnostic telemetry"
          - "operational dashboards"
          - "backup alerts"
          - "health probes"
        kusto_tables:
          - "OperationStatsLocalAllClusters"
          - "TraceLogMessageAllClusters"
      paths:
        docs_dir: "docs/agentKT"
        repo_clone_dir: "D:/TEMP/Mgmt-RecoverySvcs-Monitoring"
      vectorstore:
        collection_name: "monitoring_docs"
      code_index:
        collection_name: "monitoring_code"
        sync_paths:
          - "src/Service"
          - "src/ClientLib"
      agents:
        enabled:
          - "knowledge"
          - "debug"
          - "coder"

# --- Microsoft Teams Bot ---
# Register your bot at https://dev.botframework.com or via Azure Bot Service.
# Set app_id and app_password in config.local.yaml for production.
# Leave blank for local development with Bot Framework Emulator.
teams_bot:
  # app_id: set in config.local.yaml
  # app_password: set in config.local.yaml
  port: 3978
  start_kusto_server: true      # Start Kusto MCP server as a background service
  sync_interval_hours: 24       # How often to run doc/code sync (0 = disabled)
  auto_reply_delay_minutes: 10  # Auto-reply to unanswered channel messages after N minutes

# --- Code Reader LLM (for Doc Improver Agent) ---
# Uses gpt-5.1-codex-mini deployed on Azure AI Foundry for reading code.
# Separate from the main LLM to allow specialized code-reading model.
# endpoint & api_key: set in config.local.yaml
code_reader_llm:
  provider: "azure_openai"
  # endpoint: set in config.local.yaml
  # api_key: set in config.local.yaml
  model: "gpt-5.1-codex-mini"
  max_tokens: 16384

# --- Doc Improver Agent (background job) ---
# Reads code from the repo, compares against existing docs, and creates
# PRs for improvements. Runs as a scheduled background job.
doc_improver:
  enabled: true
  # How often to run the improvement cycle (hours). 0 = manual only.
  run_interval_hours: 72
  # Max improvement iterations per cycle (converges when no new changes)
  max_iterations: 3
  # Max new docs to create per cycle (higher = more during bootstrap)
  max_new_docs_per_cycle: 15
  # Folders within the repo that contain the source code to analyze
  code_folders:
    - "src/Microsoft.Azure.Management.BackupManagement"
  # Additional docs protected by this agent only (merged with top-level
  # protected_docs list).  Prefer adding entries to the top-level list
  # so ALL agents respect them.
  protected_docs:
    - "BackupMgmt_Architecture_Memory.md"
  # Branch prefix for doc improvement PRs
  branch_prefix: "BCDR-devai/doc-improvement"
  # Minimum diff threshold — skip PR if fewer than this many lines changed
  min_diff_lines: 10
